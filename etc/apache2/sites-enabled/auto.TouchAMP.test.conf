define ROOT "F:/Projeler/TouchAMP/www/TouchAMP"
define DOCROOT "F:/Projeler/TouchAMP/www/TouchAMP"
<VirtualHost *:80>
ServerName TouchAMP.test
DocumentRoot "${DOCROOT}"
<Directory "${DOCROOT}">
AllowOverride All
Require all granted
</Directory>
</VirtualHost>
<VirtualHost *:443>
ServerName TouchAMP.test
DocumentRoot "${DOCROOT}"
SSLEngine on
SSLCertificateFile "F:/Projeler/TouchAMP/etc/ssl/TouchAMP.test.crt"
SSLCertificateKeyFile "F:/Projeler/TouchAMP/etc/ssl/TouchAMP.test.key"
<Directory "${DOCROOT}">
AllowOverride All
Require all granted
</Directory>
</VirtualHost>
