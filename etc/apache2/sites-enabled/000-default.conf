<VirtualHost *:80>
  ServerName localhost
  ServerAlias 127.0.0.1 ::1
  DocumentRoot "F:/Projeler/TouchAMP/www"
  <Directory "F:/Projeler/TouchAMP/www">
    AllowOverride All
    Require all granted
    Options Indexes FollowSymLinks
  </Directory>
</VirtualHost>
<VirtualHost *:443>
  ServerName localhost
  ServerAlias 127.0.0.1 ::1
  DocumentRoot "F:/Projeler/TouchAMP/www"
  SSLEngine on
  SSLCertificateFile "F:/Projeler/TouchAMP/etc/ssl/localhost.crt"
  SSLCertificateKeyFile "F:/Projeler/TouchAMP/etc/ssl/localhost.key"
  <Directory "F:/Projeler/TouchAMP/www">
    AllowOverride All
    Require all granted
    Options Indexes FollowSymLinks
  </Directory>
</VirtualHost>
